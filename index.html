<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>JAPAN LIVE TV</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon.png.png">
    
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">

    <style>
        body { margin: 0; background: #121212; color: white; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        
        /* 헤더 영역 */
        .header { 
            padding: 20px; text-align: center; border-bottom: 1px solid #333; 
            position: sticky; top: 0; background: #121212; z-index: 10; 
        }
        .title { color: #00adb5; margin: 0; font-size: 24px; font-weight: bold; letter-spacing: 1px; }

        /* 채널 리스트 레이아웃 */
        .list { padding: 20px; max-width: 800px; margin: 0 auto; }
        .card { 
            background: #1e1e1e; padding: 25px; border-radius: 15px; margin-bottom: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            cursor: pointer; border-left: 5px solid #00adb5;
            transition: transform 0.2s, background 0.2s;
        }
        .card:active { transform: scale(0.98); background: #252525; }
        .channel-name { font-size: 20px; font-weight: bold; }
        .live-badge { 
            color: #ff4b5c; border: 1px solid #ff4b5c; padding: 4px 10px; 
            border-radius: 6px; font-size: 14px; font-weight: bold; 
        }

        /* 전체화면 플레이어 */
        #player-container { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: black; z-index: 100; 
        }
        .back-bar { 
            height: 60px; background: #111; display: flex; align-items: center; 
            padding: 0 20px; cursor: pointer; color: #00adb5; font-weight: bold; font-size: 18px;
        }
        
        /* iframe 최적화 */
        iframe { 
            width: 100%; height: calc(100% - 60px); border: none; background: #000;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>

    <div id="main-ui">
        <div class="header">
            <h1 class="title">JAPAN LIVE TV 📺</h1>
        </div>
        <div class="list" id="channel-list">
            </div>
    </div>

    <div id="player-container">
        <div class="back-bar" onclick="closePlayer()">← 목록으로 돌아가기</div>
        <iframe 
            id="video-frame" 
            allow="autoplay; fullscreen; encrypted-media; picture-in-picture" 
            allowfullscreen 
            referrerpolicy="no-referrer-when-downgrade"
            sandbox="allow-forms allow-scripts allow-same-origin allow-presentation"
            src="">
        </iframe>
    </div>

    <script>
        // 1. JSON 파일에서 채널 정보를 읽어와 리스트 생성
        document.addEventListener('DOMContentLoaded', () => {
            const listEl = document.getElementById('channel-list');

            fetch('channels.json')
                .then(response => {
                    if (!response.ok) throw new Error('JSON 파일을 찾을 수 없습니다.');
                    return response.json();
                })
                .then(channels => {
                    channels.forEach(ch => {
                        const div = document.createElement('div');
                        div.className = 'card';
                        div.innerHTML = `
                            <span class="channel-name">${ch.name}</span>
                            <span class="live-badge">LIVE</span>
                        `;
                        div.onclick = () => openPlayer(ch.url);
                        listEl.appendChild(div);
                    });
                })
                .catch(err => {
                    console.error('로딩 에러:', err);
                    listEl.innerHTML = `<p style="text-align:center; color:gray;">채널 정보를 불러오지 못했습니다.<br>(${err.message})</p>`;
                });
        });

        // 2. 플레이어 열기 함수
        function openPlayer(url) {
            const frame = document.getElementById('video-frame');
            const container = document.getElementById('player-container');
            if (frame && container) {
                // 주소에 자동재생 파라미터 강제 추가
                const finalUrl = url.includes('?') ? `${url}&autoplay=1` : `${url}?autoplay=1`;
                frame.src = finalUrl;
                container.style.display = 'block';
                
                // 모바일에서 스크롤 방지
                document.body.style.overflow = 'hidden';
            }
        }

        // 3. 플레이어 닫기 함수
        function closePlayer() {
            const frame = document.getElementById('video-frame');
            const container = document.getElementById('player-container');
            if (frame && container) {
                frame.src = '';
                container.style.display = 'none';
                
                // 스크롤 복구
                document.body.style.overflow = 'auto';
            }
        }
    </script>
</body>
</html>
