<!DOCTYPE html>
<html lang="ja">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Y2GJB27CH2"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-Y2GJB27CH2');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MY JAPAN LIVE TV</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#080e1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <script src="channels.js"></script>
    <script src="status.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:          #1c3561;
            --surface:     #274272;
            --surface-hover: #304e84;
            --border:      rgba(255,255,255,0.09);
            --border-hover:rgba(255,255,255,0.18);
            --text:        #e8eef8;
            --text-sub:    #7a96be;
            --radius:      14px;
        }

        body {
            background: linear-gradient(160deg, #1f3d72 0%, #162d5a 40%, #1a3366 100%);
            background-attachment: fixed;
            color: var(--text);
            font-family: -apple-system, 'Helvetica Neue', 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* ── Header ── */
        .header {
            position: sticky; top: 0; z-index: 50;
            background: rgba(28,53,97,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .header-logo { display: flex; align-items: center; gap: 10px; }
        .header-logo img { width: 28px; height: 28px; border-radius: 8px; }
        .header-title {
            font-size: 15px; font-weight: 800; letter-spacing: 2.5px;
            background: linear-gradient(120deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header-badge {
            font-size: 10px; font-weight: 700; letter-spacing: 1px;
            color: #ef4444; border: 1px solid rgba(239,68,68,0.3);
            padding: 3px 8px; border-radius: 20px;
            display: flex; align-items: center; gap: 5px;
        }
        .header-badge::before {
            content: ''; width: 5px; height: 5px; border-radius: 50%;
            background: #ef4444; animation: blink 2s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        /* ── Status info bar ── */
        .status-bar {
            max-width: 560px; margin: 0 auto;
            padding: 10px 14px 0;
            display: flex; align-items: center; justify-content: space-between;
            gap: 8px; flex-wrap: wrap;
        }
        .status-bar-left {
            display: flex; align-items: center; gap: 6px;
            font-size: 11px; color: var(--text-sub);
        }
        .status-bar-left svg { width:12px; height:12px; opacity:0.6; flex-shrink:0; }
        .status-bar-right {
            font-size: 11px; color: var(--text-sub);
            display: flex; align-items: center; gap: 5px;
        }
        .status-bar-right strong { color: #93b8e0; font-weight: 600; }

        /* ── Content ── */
        .content {
            max-width: 560px; margin: 0 auto;
            padding: 12px 14px 80px;
        }

        /* ── Section label ── */
        .section-label {
            font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
            color: var(--text-sub); text-transform: uppercase;
            padding: 24px 2px 10px;
            display: flex; align-items: center; gap: 10px;
        }
        .section-label::after {
            content: ''; flex: 1; height: 1px;
            background: var(--border);
        }

        /* ── Channel card ── */
        .card {
            display: flex; align-items: center; gap: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 13px 16px;
            margin-bottom: 7px;
            cursor: pointer;
            transition: background 0.18s ease, border-color 0.18s ease, transform 0.12s ease;
            opacity: 0; transform: translateY(10px);
        }
        .card:hover {
            background: var(--surface-hover);
            border-color: var(--border-hover);
        }
        .card:active { transform: scale(0.975); }

        /* ── Network badge ── */
        .badge {
            width: 44px; height: 44px; border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
            font-size: 9.5px; font-weight: 800; letter-spacing: -0.2px;
            flex-shrink: 0;
            background: var(--badge-bg);
            color: var(--badge-color);
            border: 1px solid var(--badge-border);
        }

        /* ── Channel info ── */
        .info { flex: 1; min-width: 0; }
        .ch-name { font-size: 14px; font-weight: 600; color: var(--text); }
        .ch-sub  { font-size: 11px; color: var(--text-sub); margin-top: 2px;
                   white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ── Status pip ── */
        .status-pip {
            display: flex; align-items: center; gap: 5px;
            font-size: 9px; font-weight: 800; letter-spacing: 1px;
            flex-shrink: 0;
        }
        .status-pip::before {
            content:''; width:6px; height:6px; border-radius:50%; flex-shrink:0;
        }
        .status-pip.live   { color: #ef4444; }
        .status-pip.live::before   { background:#ef4444; animation: blink 2s infinite; }
        .status-pip.offline { color: #4a6080; }
        .status-pip.offline::before { background:#4a6080; }
        .status-pip.unknown { color: #4a6080; }
        .status-pip.unknown::before { background:#4a6080; opacity:0.5; }

        /* 오프라인 카드 살짝 흐리게 */
        .card.is-offline { opacity: 0.55; }

        /* ── Card appear animation ── */
        @keyframes appear {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Footer ── */
        .footer {
            text-align: center; padding: 30px 20px 0;
            font-size: 11px; color: var(--text-sub); line-height: 1.8;
            border-top: 1px solid var(--border);
        }

        /* ══════════════════════════════
           Player overlay
        ══════════════════════════════ */
        #player-wrap {
            display: none; position: fixed; inset: 0;
            background: #000; z-index: 100;
            flex-direction: column;
        }
        #player-wrap.open { display: flex; }

        .player-bar {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(28,53,97,0.97);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 16px; height: 58px; flex-shrink: 0;
            gap: 12px;
        }
        .player-back {
            display: flex; align-items: center; gap: 7px;
            color: #60a5fa; font-size: 14px; font-weight: 600;
            cursor: pointer; flex-shrink: 0;
        }
        .player-back svg { width:16px; height:16px; stroke: #60a5fa; }
        .player-ch-name {
            flex: 1; font-size: 14px; font-weight: 700; color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            text-align: center;
        }

        #video-frame { width:100%; flex:1; border:none; background:#000; }
        #hls-video   { width:100%; flex:1; background:#000; display:none; outline:none; }
    </style>
</head>
<body>

<!-- ── Main UI ── -->
<div id="main-ui">
    <header class="header">
        <div class="header-logo">
            <img src="icon.png" alt="icon">
            <span class="header-title">JAPAN LIVE TV</span>
        </div>
        <div class="header-badge">LIVE</div>
    </header>

    <div class="status-bar">
        <div class="status-bar-left">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/><path d="M12 7v5l3 3"/>
            </svg>
            Stream status checked every hour
        </div>
        <div class="status-bar-right" id="last-checked"></div>
    </div>

    <div class="content" id="channel-list"></div>

    <footer class="footer">
        <p>A personal, non-commercial project for <strong style="color:#8ba3c0">Japanese language learning</strong>.</p>
    </footer>
</div>

<!-- ── Player ── -->
<div id="player-wrap">
    <div class="player-bar">
        <div class="player-back" onclick="closePlayer()">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            Back
        </div>
        <div class="player-ch-name" id="player-title"></div>
    </div>
    <iframe id="video-frame"
        allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
        allowfullscreen referrerpolicy="no-referrer-when-downgrade" src=""></iframe>
    <video id="hls-video" controls autoplay playsinline></video>
</div>

<script>
// ── 채널 메타데이터 (배지 색상·서브타이틀·카테고리) ──
const META = {
    "NHK G":      { abbr:"NHK",  c:"#1a73e8", sub:"Japan Broadcasting Corporation", cat:"Tokyo Terrestrial" },
    "NHK E テレ": { abbr:"Eテレ", c:"#1a73e8", sub:"NHK Educational Television",     cat:"Tokyo Terrestrial" },
    "NTV":        { abbr:"NTV",  c:"#e8112d", sub:"Nippon Television",               cat:"Tokyo Terrestrial" },
    "TV ASAHI":   { abbr:"EX",   c:"#00a0e9", sub:"TV Asahi",                        cat:"Tokyo Terrestrial" },
    "TBS":        { abbr:"TBS",  c:"#e8112d", sub:"Tokyo Broadcasting System",       cat:"Tokyo Terrestrial" },
    "TV TOKYO":   { abbr:"TX",   c:"#009944", sub:"TV Tokyo",                        cat:"Tokyo Terrestrial" },
    "FUJI TV":    { abbr:"CX",   c:"#ff6e00", sub:"Fuji Television Network",         cat:"Tokyo Terrestrial" },
    "Tokyo MX":   { abbr:"MX",   c:"#9333ea", sub:"Tokyo Metropolitan Television",   cat:"Tokyo Terrestrial" },
    "MBS":        { abbr:"MBS",  c:"#e8112d", sub:"Mainichi Broadcasting System",    cat:"Kansai Terrestrial" },
    "ABC TV":     { abbr:"ABC",  c:"#005bab", sub:"Asahi Broadcasting Television",   cat:"Kansai Terrestrial" },
    "関西TV":     { abbr:"KTV",  c:"#ff6e00", sub:"Kansai Television",               cat:"Kansai Terrestrial" },
    "ytv":        { abbr:"ytv",  c:"#e8112d", sub:"Yomiuri Telecasting Corporation", cat:"Kansai Terrestrial" },
    "NHK World":  { abbr:"NHK",  c:"#1a73e8", sub:"NHK World-Japan",                 cat:"Others" },
    "Weathernews":{ abbr:"WN",   c:"#0288d1", sub:"Weathernews Live",                cat:"Others" },
};

let hlsInstance = null;

// ── 마지막 상태 체크 시간 표시 ──
function renderLastChecked() {
    const el = document.getElementById('last-checked');
    if (!el) return;
    const updated = window.STATUS && window.STATUS.updated;
    if (!updated) { el.textContent = ''; return; }

    const diff = Math.floor((Date.now() - new Date(updated).getTime()) / 1000);
    let label;
    if      (diff < 60)   label = 'just now';
    else if (diff < 3600) label = `${Math.floor(diff / 60)}m ago`;
    else if (diff < 86400)label = `${Math.floor(diff / 3600)}h ago`;
    else                  label = new Date(updated).toLocaleDateString();

    const timeStr = new Date(updated).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    el.innerHTML = `Last checked: <strong>${timeStr}</strong> <span style="opacity:0.6">(${label})</span>`;
}

// ── 채널 목록 렌더링 ──
document.addEventListener('DOMContentLoaded', () => {
    renderLastChecked();

    const root = document.getElementById('channel-list');
    const channels = window.CHANNELS;

    if (!channels || !channels.length) {
        root.innerHTML = '<p style="text-align:center;color:#4a6080;margin-top:60px">Failed to load channels.</p>';
        return;
    }

    // 카테고리별 그룹핑
    const groups = {};
    const ORDER  = ["Tokyo Terrestrial", "Kansai Terrestrial", "Others"];
    channels.forEach(ch => {
        const cat = (META[ch.name] || {}).cat || "その他";
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push(ch);
    });

    let delay = 0;
    ORDER.forEach(cat => {
        if (!groups[cat]) return;

        const label = document.createElement('div');
        label.className = 'section-label';
        label.textContent = cat;
        root.appendChild(label);

        groups[cat].forEach(ch => {
            const m = META[ch.name] || { abbr: ch.name.slice(0,3), c: '#60a5fa', sub: '' };
            const r = hexToRgb(m.c);

            const chStatus = (window.STATUS && window.STATUS.channels) ? window.STATUS.channels[ch.name] : null;
            const pipClass = chStatus === 'live' ? 'live' : chStatus === 'offline' ? 'offline' : 'unknown';
            const pipLabel = chStatus === 'offline' ? 'OFF AIR' : 'LIVE';

            const card = document.createElement('div');
            card.className = 'card' + (chStatus === 'offline' ? ' is-offline' : '');
            card.style.cssText = [
                `--badge-color:${m.c}`,
                `--badge-bg:rgba(${r},0.12)`,
                `--badge-border:rgba(${r},0.25)`,
                `animation: appear 0.4s ease forwards ${delay}s`,
            ].join(';');
            card.innerHTML = `
                <div class="badge">${m.abbr}</div>
                <div class="info">
                    <div class="ch-name">${ch.name}</div>
                    <div class="ch-sub">${m.sub}</div>
                </div>
                <div class="status-pip ${pipClass}">${pipLabel}</div>`;
            card.onclick = () => openPlayer(ch.url, ch.name);
            root.appendChild(card);
            delay += 0.05;
        });
    });
});

function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `${r},${g},${b}`;
}

// ── 플레이어 열기 ──
function openPlayer(url, name) {
    if (typeof gtag === 'function')
        gtag('event', 'select_content', { content_type: 'channel', content_id: name });

    const wrap  = document.getElementById('player-wrap');
    const frame = document.getElementById('video-frame');
    const vid   = document.getElementById('hls-video');
    document.getElementById('player-title').textContent = name;


    if (url.includes('.m3u8')) {
        frame.style.display = 'none'; frame.src = '';
        vid.style.display   = 'block';
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        if (typeof Hls !== 'undefined' && Hls.isSupported()) {
            hlsInstance = new Hls({ enableWorker: false });
            hlsInstance.loadSource(url);
            hlsInstance.attachMedia(vid);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => vid.play().catch(()=>{}));
        } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
            vid.src = url; vid.play().catch(()=>{});
        }
    } else {
        vid.style.display   = 'none'; vid.src = '';
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        frame.style.display = 'block';
        frame.src = url.includes('?') ? `${url}&autoplay=1` : `${url}?autoplay=1`;
    }

    wrap.classList.add('open');
    document.body.style.overflow = 'hidden';
}

// ── 플레이어 닫기 ──
function closePlayer() {
    const wrap  = document.getElementById('player-wrap');
    const frame = document.getElementById('video-frame');
    const vid   = document.getElementById('hls-video');
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    vid.src = ''; vid.style.display = 'none';
    frame.src = ''; frame.style.display = 'block';
    wrap.classList.remove('open');
    document.body.style.overflow = 'auto';
}

if ('serviceWorker' in navigator)
    navigator.serviceWorker.register('/my-japan-tv/sw.js')
        .then(() => console.log('SW registered'));
</script>
</body>
</html>
