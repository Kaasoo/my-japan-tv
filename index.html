<!DOCTYPE html>
<html lang="ja">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Y2GJB27CH2"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-Y2GJB27CH2');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MY JAPAN LIVE TV</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#080e1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <script src="channels.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:          #111e35;
            --surface:     #182743;
            --surface-hover: #1e3052;
            --border:      rgba(255,255,255,0.06);
            --border-hover:rgba(255,255,255,0.12);
            --text:        #e2e8f0;
            --text-sub:    #4a6080;
            --radius:      14px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, 'Helvetica Neue', 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* ── Header ── */
        .header {
            position: sticky; top: 0; z-index: 50;
            background: rgba(17,30,53,0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .header-logo { display: flex; align-items: center; gap: 10px; }
        .header-logo img { width: 28px; height: 28px; border-radius: 8px; }
        .header-title {
            font-size: 15px; font-weight: 800; letter-spacing: 2.5px;
            background: linear-gradient(120deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header-badge {
            font-size: 10px; font-weight: 700; letter-spacing: 1px;
            color: #ef4444; border: 1px solid rgba(239,68,68,0.3);
            padding: 3px 8px; border-radius: 20px;
            display: flex; align-items: center; gap: 5px;
        }
        .header-badge::before {
            content: ''; width: 5px; height: 5px; border-radius: 50%;
            background: #ef4444; animation: blink 2s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        /* ── Content ── */
        .content {
            max-width: 560px; margin: 0 auto;
            padding: 20px 14px 80px;
        }

        /* ── Section label ── */
        .section-label {
            font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
            color: var(--text-sub); text-transform: uppercase;
            padding: 24px 2px 10px;
            display: flex; align-items: center; gap: 10px;
        }
        .section-label::after {
            content: ''; flex: 1; height: 1px;
            background: var(--border);
        }

        /* ── Channel card ── */
        .card {
            display: flex; align-items: center; gap: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 13px 16px;
            margin-bottom: 7px;
            cursor: pointer;
            transition: background 0.18s ease, border-color 0.18s ease, transform 0.12s ease;
            opacity: 0; transform: translateY(10px);
        }
        .card:hover {
            background: var(--surface-hover);
            border-color: var(--border-hover);
        }
        .card:active { transform: scale(0.975); }

        /* ── Network badge ── */
        .badge {
            width: 44px; height: 44px; border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
            font-size: 9.5px; font-weight: 800; letter-spacing: -0.2px;
            flex-shrink: 0;
            background: var(--badge-bg);
            color: var(--badge-color);
            border: 1px solid var(--badge-border);
        }

        /* ── Channel info ── */
        .info { flex: 1; min-width: 0; }
        .ch-name { font-size: 14px; font-weight: 600; color: var(--text); }
        .ch-sub  { font-size: 11px; color: var(--text-sub); margin-top: 2px;
                   white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ── Live pip ── */
        .live-pip {
            display: flex; align-items: center; gap: 5px;
            font-size: 9px; font-weight: 800; letter-spacing: 1px;
            color: #ef4444; flex-shrink: 0;
        }
        .live-pip::before {
            content:''; width:6px; height:6px; border-radius:50%;
            background:#ef4444; animation: blink 2s infinite;
        }

        /* ── Card appear animation ── */
        @keyframes appear {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Footer ── */
        .footer {
            text-align: center; padding: 30px 20px 0;
            font-size: 11px; color: var(--text-sub); line-height: 1.8;
            border-top: 1px solid var(--border);
        }

        /* ══════════════════════════════
           Player overlay
        ══════════════════════════════ */
        #player-wrap {
            display: none; position: fixed; inset: 0;
            background: #000; z-index: 100;
            flex-direction: column;
        }
        #player-wrap.open { display: flex; }

        .player-bar {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(17,30,53,0.97);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 16px; height: 58px; flex-shrink: 0;
            gap: 12px;
        }
        .player-back {
            display: flex; align-items: center; gap: 7px;
            color: #60a5fa; font-size: 14px; font-weight: 600;
            cursor: pointer; flex-shrink: 0;
        }
        .player-back svg { width:16px; height:16px; stroke: #60a5fa; }
        .player-ch-name {
            flex: 1; font-size: 14px; font-weight: 700; color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            text-align: center;
        }
        .player-ext {
            background: rgba(96,165,250,0.12); border: 1px solid rgba(96,165,250,0.25);
            color: #60a5fa; padding: 7px 14px; border-radius: 8px;
            font-size: 11px; font-weight: 700; cursor: pointer; flex-shrink: 0;
            transition: background 0.15s;
        }
        .player-ext:hover { background: rgba(96,165,250,0.22); }

        #video-frame { width:100%; flex:1; border:none; background:#000; }
        #hls-video   { width:100%; flex:1; background:#000; display:none; outline:none; }
    </style>
</head>
<body>

<!-- ── Main UI ── -->
<div id="main-ui">
    <header class="header">
        <div class="header-logo">
            <img src="icon.png" alt="icon">
            <span class="header-title">JAPAN LIVE TV</span>
        </div>
        <div class="header-badge">LIVE</div>
    </header>

    <div class="content" id="channel-list"></div>

    <footer class="footer">
        <p>일본어 학습 목적의 개인 비상업적 프로젝트입니다.</p>
    </footer>
</div>

<!-- ── Player ── -->
<div id="player-wrap">
    <div class="player-bar">
        <div class="player-back" onclick="closePlayer()">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            뒤로
        </div>
        <div class="player-ch-name" id="player-title"></div>
        <button class="player-ext" id="player-ext-btn">새 탭</button>
    </div>
    <iframe id="video-frame"
        allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
        allowfullscreen referrerpolicy="no-referrer-when-downgrade" src=""></iframe>
    <video id="hls-video" controls autoplay playsinline></video>
</div>

<script>
// ── 채널 메타데이터 (배지 색상·서브타이틀·카테고리) ──
const META = {
    "NHK G":      { abbr:"NHK",  c:"#1a73e8", sub:"日本放送協会",   cat:"東京 地上波" },
    "NHK E テレ": { abbr:"Eテレ", c:"#1a73e8", sub:"NHK教育テレビ",  cat:"東京 地上波" },
    "NTV":        { abbr:"NTV",  c:"#e8112d", sub:"日本テレビ",     cat:"東京 地上波" },
    "TV ASAHI":   { abbr:"EX",   c:"#00a0e9", sub:"テレビ朝日",     cat:"東京 地上波" },
    "TBS":        { abbr:"TBS",  c:"#e8112d", sub:"TBSテレビ",      cat:"東京 地上波" },
    "TV TOKYO":   { abbr:"TX",   c:"#009944", sub:"テレビ東京",     cat:"東京 地上波" },
    "FUJI TV":    { abbr:"CX",   c:"#ff6e00", sub:"フジテレビ",     cat:"東京 地上波" },
    "Tokyo MX":   { abbr:"MX",   c:"#9333ea", sub:"TOKYO MX",      cat:"東京 地上波" },
    "MBS":        { abbr:"MBS",  c:"#e8112d", sub:"毎日放送",       cat:"関西 地上波" },
    "ABC TV":     { abbr:"ABC",  c:"#005bab", sub:"朝日放送テレビ",  cat:"関西 地上波" },
    "関西TV":     { abbr:"KTV",  c:"#ff6e00", sub:"関西テレビ",     cat:"関西 地上波" },
    "ytv":        { abbr:"ytv",  c:"#e8112d", sub:"讀賣テレビ放送",  cat:"関西 地上波" },
    "NHK World":  { abbr:"NHK",  c:"#1a73e8", sub:"NHK World-Japan",cat:"その他" },
    "Weathernews":{ abbr:"WN",   c:"#0288d1", sub:"ウェザーニュース", cat:"その他" },
};

let hlsInstance = null;

// ── 채널 목록 렌더링 ──
document.addEventListener('DOMContentLoaded', () => {
    const root = document.getElementById('channel-list');
    const channels = window.CHANNELS;

    if (!channels || !channels.length) {
        root.innerHTML = '<p style="text-align:center;color:#4a6080;margin-top:60px">채널을 불러올 수 없습니다.</p>';
        return;
    }

    // 카테고리별 그룹핑
    const groups = {};
    const ORDER  = ["東京 地上波", "関西 地上波", "その他"];
    channels.forEach(ch => {
        const cat = (META[ch.name] || {}).cat || "その他";
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push(ch);
    });

    let delay = 0;
    ORDER.forEach(cat => {
        if (!groups[cat]) return;

        const label = document.createElement('div');
        label.className = 'section-label';
        label.textContent = cat;
        root.appendChild(label);

        groups[cat].forEach(ch => {
            const m = META[ch.name] || { abbr: ch.name.slice(0,3), c: '#60a5fa', sub: '' };
            const r = hexToRgb(m.c);
            const card = document.createElement('div');
            card.className = 'card';
            card.style.cssText = [
                `--badge-color:${m.c}`,
                `--badge-bg:rgba(${r},0.12)`,
                `--badge-border:rgba(${r},0.25)`,
                `animation: appear 0.4s ease forwards ${delay}s`,
            ].join(';');
            card.innerHTML = `
                <div class="badge">${m.abbr}</div>
                <div class="info">
                    <div class="ch-name">${ch.name}</div>
                    <div class="ch-sub">${m.sub}</div>
                </div>
                <div class="live-pip">LIVE</div>`;
            card.onclick = () => openPlayer(ch.url, ch.name);
            root.appendChild(card);
            delay += 0.05;
        });
    });
});

function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `${r},${g},${b}`;
}

// ── 플레이어 열기 ──
function openPlayer(url, name) {
    if (typeof gtag === 'function')
        gtag('event', 'select_content', { content_type: 'channel', content_id: name });

    const wrap  = document.getElementById('player-wrap');
    const frame = document.getElementById('video-frame');
    const vid   = document.getElementById('hls-video');
    document.getElementById('player-title').textContent = name;

    document.getElementById('player-ext-btn').onclick = () => window.open(url, '_blank');

    if (url.includes('.m3u8')) {
        frame.style.display = 'none'; frame.src = '';
        vid.style.display   = 'block';
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        if (typeof Hls !== 'undefined' && Hls.isSupported()) {
            hlsInstance = new Hls({ enableWorker: false });
            hlsInstance.loadSource(url);
            hlsInstance.attachMedia(vid);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => vid.play().catch(()=>{}));
        } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
            vid.src = url; vid.play().catch(()=>{});
        }
    } else {
        vid.style.display   = 'none'; vid.src = '';
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        frame.style.display = 'block';
        frame.src = url.includes('?') ? `${url}&autoplay=1` : `${url}?autoplay=1`;
    }

    wrap.classList.add('open');
    document.body.style.overflow = 'hidden';
}

// ── 플레이어 닫기 ──
function closePlayer() {
    const wrap  = document.getElementById('player-wrap');
    const frame = document.getElementById('video-frame');
    const vid   = document.getElementById('hls-video');
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    vid.src = ''; vid.style.display = 'none';
    frame.src = ''; frame.style.display = 'block';
    wrap.classList.remove('open');
    document.body.style.overflow = 'auto';
}

if ('serviceWorker' in navigator)
    navigator.serviceWorker.register('/my-japan-tv/sw.js')
        .then(() => console.log('SW registered'));
</script>
</body>
</html>
