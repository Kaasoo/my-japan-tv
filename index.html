<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Y2GJB27CH2"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-Y2GJB27CH2');
    </script>    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MY JAPAN LIVE TV</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">

    <style>
        :root {
            --primary: #00adb5;
            --primary-light: #00f2fe;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #64748b;
        }

        body { 
            margin: 0; 
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            color: var(--text-main); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
        }
        
        /* Header */
        .header { 
            padding: 30px 15px 20px; 
            text-align: center; 
            position: sticky; 
            top: 0; 
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .title { 
            background: linear-gradient(to right, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0; 
            font-size: 24px; 
            font-weight: 800; 
            letter-spacing: -0.5px;
        }

        /* Options Bar */
        .options-bar {
            width: 85%;
            max-width: 500px;
            margin: 20px auto 10px;
            text-align: right;
        }
        .help-btn {
            background: rgba(0, 173, 181, 0.1);
            border: 1px solid rgba(0, 173, 181, 0.3);
            color: var(--primary);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .help-btn:active { transform: scale(0.95); background: rgba(0, 173, 181, 0.2); }

        /* Channel List */
        .list { 
            padding: 10px 0 30px; 
            width: 85%;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .card { 
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 22px 24px; 
            border-radius: 20px; 
            margin-bottom: 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            cursor: pointer; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
        }
        
        .card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; height: 100%; width: 5px;
            background: var(--primary);
        }

        .card:active { transform: scale(0.96); background: rgba(51, 65, 85, 0.9); }
        
        .channel-name { font-size: 17px; font-weight: 700; letter-spacing: -0.2px; }
        .live-badge { 
            background: rgba(255, 75, 92, 0.1);
            color: #ff4b5c; 
            border: 1px solid rgba(255, 75, 92, 0.3);
            padding: 3px 10px; 
            border-radius: 8px; 
            font-size: 10px; 
            font-weight: 800; 
        }

        /* Disclaimer Section */
        .footer-disclaimer {
            width: 80%;
            max-width: 500px;
            margin: 20px auto 60px;
            padding: 20px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .disclaimer-text {
            font-size: 12px;
            color: var(--text-dim);
            line-height: 1.8;
        }

        /* Player Layout */
        #player-container { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: black; z-index: 100; 
        }
        
        .player-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            height: 65px;
            padding: 0 20px;
        }
        .back-btn { color: var(--primary); font-weight: 700; font-size: 15px; cursor: pointer; }
        .external-btn {
            background: var(--primary);
            color: #0f172a;
            border: none;
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 800;
            box-shadow: 0 4px 15px rgba(0, 173, 181, 0.3);
        }

        iframe { width: 100%; height: calc(100% - 65px); border: none; background: #000; }

        @keyframes cardAppear {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="main-ui">
        <div class="header"><h1 class="title">JAPAN LIVE TV</h1></div>
        
        <div class="options-bar">
            <button class="help-btn" onclick="showHelp()">💡 Not working?</button>
        </div>

        <div class="list" id="channel-list"></div>

        <div class="footer-disclaimer">
            <p class="disclaimer-text">
                This is a personal, non-commercial project created solely for <strong>Japanese language learning</strong>.
            </p>
        </div>
    </div>

    <div id="player-container">
        <div class="player-controls">
            <div class="back-btn" onclick="closePlayer()">✕ Back to List</div>
            <button id="open-external" class="external-btn">Desktop Mode</button>
        </div>
        <iframe id="video-frame" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowfullscreen referrerpolicy="no-referrer-when-downgrade" src=""></iframe>
    </div>

    <script>
        let currentChannelUrl = "";

        document.addEventListener('DOMContentLoaded', () => {
            const listEl = document.getElementById('channel-list');
            fetch('channels.json')
                .then(response => response.json())
                .then(channels => {
                    channels.forEach((ch, index) => {
                        const div = document.createElement('div');
                        div.className = 'card';
                        // 등장 애니메이션 지연 효과
                        div.style.animation = `cardAppear 0.5s ease forwards ${index * 0.1}s`;
                        div.innerHTML = `<span class="channel-name">${ch.name}</span><span class="live-badge">LIVE</span>`;
                        div.onclick = () => openPlayer(ch.url, ch.name);
                        listEl.appendChild(div);
                    });
                })
                .catch(err => {
                    listEl.innerHTML = `<p style="text-align:center; color:#888; margin-top:50px;">Failed to load data.</p>`;
                });
        });

        function openPlayer(url, channelName) {
            const frame = document.getElementById('video-frame');
            const container = document.getElementById('player-container');
            const externalBtn = document.getElementById('open-external');
            currentChannelUrl = url;

            if (typeof gtag === 'function') {
                gtag('event', 'select_content', { content_type: 'channel', content_id: channelName });
            }
            
            if (frame && container) {
                const videoUrl = url.includes('?') ? `${url}&autoplay=1` : `${url}?autoplay=1`;
                frame.src = videoUrl;
                container.style.display = 'block';
                document.body.style.overflow = 'hidden';

                externalBtn.onclick = () => {
                    if(confirm("If the video doesn't load, open in a new tab.\n(Desktop mode recommended.)")) {
                        window.open(url, '_blank');
                    }
                };
            }
        }

        function closePlayer() {
            const frame = document.getElementById('video-frame');
            const container = document.getElementById('player-container');
            if (frame && container) {
                frame.src = '';
                container.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        }

        function showHelp() {
            alert("📺 Seeing a blank white screen?\n\nPlease try 'Desktop Mode' in each channel's player.");
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/my-japan-tv/sw.js')
            .then(() => console.log("Service Worker Registered"));
        }
    </script>
</body>
</html>
