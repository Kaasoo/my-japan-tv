<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MY JAPAN LIVE TV</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="icon.png">
    
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">

    <style>
        body { 
            margin: 0; 
            background: #121212; 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent;
        }
        
        /* 상단 헤더 */
        .header { 
            padding: 15px; 
            text-align: center; 
            border-bottom: 1px solid #333; 
            position: sticky; 
            top: 0; 
            background: #121212; 
            z-index: 10; 
        }
        .title { color: #00adb5; margin: 0; font-size: 20px; font-weight: bold; }

        /* 옵션 바 (도움말 버튼) */
        .options-bar {
            max-width: 600px;
            margin: 10px auto 0;
            padding: 0 15px;
            text-align: right;
        }
        .help-btn {
            background: rgba(0, 173, 181, 0.1);
            border: 1px solid #00adb5;
            color: #00adb5;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 채널 리스트 */
        .list { padding: 10px 15px 30px; max-width: 600px; margin: 0 auto; }
        .card { 
            background: #1e1e1e; 
            padding: 22px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            cursor: pointer; 
            border-left: 5px solid #00adb5;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .card:active { background: #2a2a2a; transform: scale(0.98); }
        .channel-name { font-size: 18px; font-weight: bold; }
        .live-badge { 
            color: #ff4b5c; border: 1px solid #ff4b5c; padding: 2px 8px; 
            border-radius: 4px; font-size: 11px; font-weight: bold; 
        }

        /* 플레이어 레이아웃 */
        #player-container { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: black; z-index: 100; 
        }
        
        /* 플레이어 상단 컨트롤 바 */
        .player-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111;
            height: 55px;
            padding: 0 15px;
            border-bottom: 1px solid #222;
        }
        .back-btn { color: #00adb5; font-weight: bold; font-size: 16px; cursor: pointer; }
        .external-btn {
            background: #00adb5;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
        }

        iframe { width: 100%; height: calc(100% - 55px); border: none; background: #000; }
    </style>
</head>
<body>

    <div id="main-ui">
        <div class="header"><h1 class="title">MY JAPAN LIVE TV 📺</h1></div>
        
        <div class="options-bar">
            <button class="help-btn" onclick="showHelp()">💡 영상이 안 나오나요?</button>
        </div>

        <div class="list" id="channel-list">
            </div>
    </div>

    <div id="player-container">
        <div class="player-controls">
            <div class="back-btn" onclick="closePlayer()">← 목록으로</div>
            <button id="open-external" class="external-btn">새 창(PC모드) 열기</button>
        </div>
        <iframe 
            id="video-frame" 
            allow="autoplay; fullscreen; encrypted-media; picture-in-picture" 
            allowfullscreen 
            referrerpolicy="no-referrer-when-downgrade"
            src="">
        </iframe>
    </div>

    <script>
        let currentChannelUrl = "";

        // 1. JSON 데이터 로드
        document.addEventListener('DOMContentLoaded', () => {
            const listEl = document.getElementById('channel-list');

            fetch('channels.json')
                .then(response => response.json())
                .then(channels => {
                    channels.forEach(ch => {
                        const div = document.createElement('div');
                        div.className = 'card';
                        div.innerHTML = `<span class="channel-name">${ch.name}</span><span class="live-badge">LIVE</span>`;
                        div.onclick = () => openPlayer(ch.url);
                        listEl.appendChild(div);
                    });
                })
                .catch(err => {
                    listEl.innerHTML = `<p style="text-align:center; color:#888; margin-top:50px;">데이터 로딩 실패</p>`;
                });
        });

        // 2. 플레이어 열기
        function openPlayer(url) {
            const frame = document.getElementById('video-frame');
            const container = document.getElementById('player-container');
            const externalBtn = document.getElementById('open-external');
            
            currentChannelUrl = url;
            
            if (frame && container) {
                const videoUrl = url.includes('?') ? `${url}&autoplay=1` : `${url}?autoplay=1`;
                frame.src = videoUrl;
                container.style.display = 'block';
                document.body.style.overflow = 'hidden';

                // 새 창 열기 버튼 이벤트
                externalBtn.onclick = () => {
                    if(confirm("영상이 안 나올 경우 확인을 눌러 새 창으로 여세요.\n(브라우저 설정에서 '데스크탑 모드'를 켜면 더 확실합니다.)")) {
                        window.open(url, '_blank');
                    }
                };
            }
        }

        // 3. 플레이어 닫기
        function closePlayer() {
            const frame = document.getElementById('video-frame');
            const container = document.getElementById('player-container');
            if (frame && container) {
                frame.src = '';
                container.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        }

        // 4. 도움말 팝업
        function showHelp() {
            alert(
                "📺 영상이 하얀 화면으로 나오나요?\n\n" +
                "1. 아이폰: 주소창 왼쪽 [가A] -> [데스크탑 웹사이트 요청]\n" +
                "2. 안드로이드: 우측 상단 [점3개] -> [데스크탑 사이트] 체크\n\n" +
                "이 설정을 켜면 차단된 영상이 정상적으로 재생됩니다!"
            );
        }
    </script>
    <script>
    if ('serviceWorker' in navigator) {
        // GitHub Pages 경로를 고려하여 등록
        navigator.serviceWorker.register('/my-japan-tv/sw.js')
        .then(() => console.log("Service Worker Registered"));
    }
    </script>
</body>
</html>
