<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MY JAPAN LIVE TV</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; overflow-x: hidden; }
        .header { padding: 20px; text-align: center; border-bottom: 1px solid #333; position: sticky; top: 0; background: #121212; z-index: 10; }
        .title { color: #00adb5; margin: 0; font-size: 20px; font-weight: bold; }
        .list { padding: 15px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-left: 4px solid #00adb5; }
        .card:active { background: #222; }
        .channel-name { font-size: 18px; font-weight: bold; }
        .live-badge { color: #ff4b5c; border: 1px solid #ff4b5c; padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        
        /* 전체화면 플레이어 */
        #player-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 100; }
        .back-bar { height: 50px; background: #111; display: flex; align-items: center; padding: 0 15px; cursor: pointer; color: #ccc; }
        iframe { width: 100%; height: calc(100% - 50px); border: none; }
    </style>
</head>
<body>

    <div id="main-ui">
        <div class="header"><h1 class="title">JAPAN LIVE TV</h1></div>
        <div class="list" id="channel-list">
            </div>
    </div>

    <div id="player-container">
        <div class="back-bar" onclick="closePlayer()">← 목록으로 돌아가기</div>
        <iframe id="video-frame" allowfullscreen src=""></iframe>
    </div>

    <script>
        // 채널 데이터를 최신 주소로 정리했습니다
        const channels = [
            { name: 'NHK G', url: 'https://mov3.co/embednhk.html?nochat=1' },
            { name: 'TV ASAHI', url: 'https://mov3.co/tvasahi.html?nochat=1' },
            { name: 'TV TOKYO', url: 'https://mov3.co/tvtokyo.html?nochat=1' },
            { name: 'NTV', url: 'https://mov3.co/embedntv.html?nochat=1' },
            { name: 'FUJI TV', url: 'https://mov3.co/embedfujitv.html?nochat=1' },
            { name: 'TBS', url: 'https://mov3.co/embedtbs.html?nochat=1' },
            { name: 'Tokyo MX', url: 'https://mov3.co/tokyomx.html?nochat=1' }
        ];

        // 리스트 생성 함수를 DOM이 완전히 로드된 후 실행하도록 변경
        document.addEventListener('DOMContentLoaded', () => {
            const listEl = document.getElementById('channel-list');
            if (!listEl) return;

            channels.forEach(ch => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<span class="channel-name">${ch.name}</span><span class="live-badge">LIVE</span>`;
                div.onclick = () => openPlayer(ch.url);
                listEl.appendChild(div);
            });
        });

        function openPlayer(url) {
            const frame = document.getElementById('video-frame');
            const container = document.getElementById('player-container');
            if (frame && container) {
                frame.src = url;
                container.style.display = 'block';
            }
        }

        function closePlayer() {
            const frame = document.getElementById('video-frame');
            const container = document.getElementById('player-container');
            if (frame && container) {
                frame.src = '';
                container.style.display = 'none';
            }
        }
    </script>
</body>
</html>
