name: Hourly Status Check

on:
  schedule:
    - cron: '0 * * * *'  # 매 시 정각 (UTC)
  workflow_dispatch:       # 수동 실행 버튼 유지

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check stream status
        run: python check_status.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add status.js
          git commit -m "Auto-update status [skip ci]" || echo "No changes to commit"
          git push origin main
