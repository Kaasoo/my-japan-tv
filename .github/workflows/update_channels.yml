name: Daily Channel Update

on:
  schedule:
    # UTC 기준 03:00은 한국 시간(KST)으로 낮 12시입니다.
    - cron: '0 3 * * *'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # v3에서 v4로 업데이트

      - name: Set up Python
        uses: actions/setup-python@v5  # v4에서 v5로 업데이트
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          python -m playwright install chromium

      - name: Run Scraper
        run: python fetch_source_url.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add channels.json
          git commit -m "Auto-update channels.json [skip ci]" || exit 0
          git push